version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: tcil_postgres
    restart: always
    environment:
      POSTGRES_DB: tcil_db
      POSTGRES_USER: tcil
      POSTGRES_PASSWORD: tcil123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql

  minio:
    image: minio/minio
    container_name: tcil_minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  redis:
    image: redis:7-alpine
    container_name: tcil_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: tcil_backend
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - minio
      - redis
    environment:
      PORT: 4000
      DATABASE_URL: postgres://tcil:tcil123@postgres:5432/tcil_db
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      REDIS_URL: redis://redis:6379
      JWT_SECRET: tcil_super_secret_jwt_key_2026
      NODE_ENV: development

  python_service:
    build: ./python-service
    container_name: tcil_python
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - minio
      - redis
    environment:
      DATABASE_URL: postgres://tcil:tcil123@postgres:5432/tcil_db
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      REDIS_URL: redis://redis:6379

  frontend:
    build: ./frontend
    container_name: tcil_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_MINIO_URL: http://localhost:9000

volumes:
  pgdata:
  miniodata: